        extend: {
          boxShadow: {
            glass: '0 20px 50px rgba(15, 23, 42, 0.18)',
            soft: '0 10px 30px rgba(2, 6, 23, 0.12)',
            floaty: '0 25px 60px rgba(59, 130, 246, 0.18)',
          },
          animation: {
            floaty: 'floaty 6s ease-in-out infinite',
            fadeIn: 'fadeIn 0.35s ease',
          },
          keyframes: {
            floaty: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-8px)' },
            },
            fadeIn: {
              from: { opacity: 0, transform: 'translateY(8px)' },
              to: { opacity: 1, transform: 'translateY(0)' },

  <style>
    :root {
      --bg1: #eef4ff;
      --bg2: #fff7ed;
      --card: rgba(255,255,255,0.72);
      --card-border: rgba(255,255,255,0.65);
      --text: #0f172a;
      --muted: #475569;
      --accent: #2563eb;
      --accent-2: #7c3aed;
      --success: #15803d;
      --danger: #dc2626;
      --warning: #d97706;
    }
    .dark {
      --bg1: #020617;
      --bg2: #0f172a;
      --card: rgba(15,23,42,0.72);
      --card-border: rgba(148,163,184,0.14);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #60a5fa;
      --accent-2: #a78bfa;
      --success: #4ade80;
      --danger: #f87171;
      --warning: #fbbf24;
    }
    html {
      scroll-behavior: smooth;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(96,165,250,.18), transparent 24%),
        radial-gradient(circle at top right, rgba(167,139,250,.14), transparent 20%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      min-height: 100vh;
    }
    .glass {
      background: var(--card);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--card-border);
      box-shadow: 0 10px 30px rgba(15,23,42,.08);
    }
    .soft-input {
      border: 1px solid rgba(148,163,184,.28);
      background: rgba(255,255,255,.7);
      color: #0f172a;
      transition: .2s ease;
    }
    .dark .soft-input {
      background: rgba(15,23,42,.72);
      color: #f8fafc;
      border-color: rgba(148,163,184,.18);
    }
    .soft-input:focus {
      outline: none;
      border-color: rgba(59,130,246,.65);
      box-shadow: 0 0 0 4px rgba(59,130,246,.12);
    }
    .btn-3d {
      position: relative;
      transform-style: preserve-3d;
      transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
      box-shadow: 0 12px 24px rgba(37,99,235,.18), inset 0 1px 0 rgba(255,255,255,.35);
    }
    .btn-3d:hover { transform: translateY(-2px); }
    .btn-3d:active { transform: translateY(1px) scale(.99); }
    .card-3d {
      transform: perspective(1000px) rotateX(0deg) rotateY(0deg);
      transition: transform .25s ease, box-shadow .25s ease;
    }
    .card-3d:hover {
      transform: perspective(1000px) rotateX(2deg) rotateY(-2deg) translateY(-2px);
      box-shadow: 0 24px 60px rgba(2,6,23,.12);
    }
    .hidden-file-input { display: none; }
    .safe-area {
      padding-bottom: max(1rem, env(safe-area-inset-bottom));
    }
    .sticky-bottom-nav {
      position: sticky;
      bottom: 0;
      z-index: 40;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .table-scroll::-webkit-scrollbar { height: 8px; width: 8px; }
    .table-scroll::-webkit-scrollbar-thumb { background: rgba(148,163,184,.45); border-radius: 999px; }
    .modal-enter { animation: fadeIn .2s ease; }
    @media print {
      .no-print { display: none !important; }
      body { background: white !important; }
      .glass { background: white !important; border: 1px solid #ddd !important; box-shadow: none !important; }
    }
  </style>

    // =============================
    // HELPERS
    // =============================
    const $ = (sel, root = document) => root.querySelector(sel);
    const $$ = (sel, root = document) => [...root.querySelectorAll(sel)];
    const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
    const todayStr = () => new Date().toISOString().slice(0, 10);
    const monthStr = (d = new Date()) => d.toISOString().slice(0, 7);
    const weekKey = (dateStr) => {
      const d = new Date(dateStr + 'T00:00:00');
      const onejan = new Date(d.getFullYear(), 0, 1);
      const week = Math.ceil((((d - onejan) / 86400000) + onejan.getDay() + 1) / 7);
      return `${d.getFullYear()}-W${String(week).padStart(2, '0')}`;
    };
    const fmtMoney = (n) => `${APP_CONFIG.currency}${Number(n || 0).toFixed(2)}`;
    const formatDateNice = (str, lang) => new Date(str + 'T00:00:00').toLocaleDateString(lang === 'hi' ? 'hi-IN' : 'en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    const saveLS = (k, v) => localStorage.setItem(k, JSON.stringify(v));
    const readLS = (k, fallback) => {
      try {
        const v = localStorage.getItem(k);
        return v ? JSON.parse(v) : fallback;
      } catch {
        return fallback;
      }
    };
    const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));

    // APP STATE

    const state = {
      lang: readLS(KEYS.lang, 'en'),
      theme: readLS(KEYS.theme, 'dark'),
      auth: readLS(KEYS.auth, null),
      entries: readLS(KEYS.data, []),
      backups: readLS(KEYS.backups, []),
      shops: readLS('masoi_shops', APP_CONFIG.shops),
      page: 'dashboard',
      search: '',
      filterShop: 'all',
      fromDate: '',
      toDate: '',
      selectedDate: todayStr(),
      selectedMonth: monthStr(),
      editingId: null,
      customUnitEnabled: false,
      modalEntryId: null,
    };

    // =============================
    // TEXT HELPERS
    // =============================
    function tr(key) {
      return T[state.lang][key] || key;
    }

    function applyTheme() {
      document.documentElement.classList.toggle('dark', state.theme === 'dark');
      saveLS(KEYS.theme, state.theme);
    }

    function persist() {
      saveLS(KEYS.data, state.entries);
      saveLS(KEYS.backups, state.backups);
      saveLS('masoi_shops', state.shops);
      saveLS(KEYS.lang, state.lang);
      saveLS(KEYS.theme, state.theme);
      saveLS(KEYS.auth, state.auth);
    }

    function toast(message, type = 'info') {
      let wrap = $('#toast-wrap');
      if (!wrap) {
        wrap = document.createElement('div');
        wrap.id = 'toast-wrap';
        wrap.className = 'fixed top-4 right-4 z-[9999] space-y-3 max-w-sm';
        document.body.appendChild(wrap);
      }
      const colors = {
        info: 'from-blue-500 to-indigo-500',
        success: 'from-green-500 to-emerald-500',
        error: 'from-red-500 to-pink-500',
        warning: 'from-amber-500 to-orange-500'
      };
      const el = document.createElement('div');
      el.className = `text-white rounded-2xl px-4 py-3 shadow-2xl bg-gradient-to-r ${colors[type] || colors.info} animate-fadeIn`;
      el.textContent = message;
      wrap.appendChild(el);
      setTimeout(() => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(-6px)';
        el.style.transition = '.25s';
        setTimeout(() => el.remove(), 250);
      }, 2400);
    }

    function getEntriesFiltered() {
      return state.entries.filter(e => {
        const q = state.search.trim().toLowerCase();
        const matchQ = !q || [e.shop, e.person, e.product, e.note, e.unit].some(v => String(v || '').toLowerCase().includes(q));
        const matchShop = state.filterShop === 'all' || e.shop === state.filterShop;
        const matchFrom = !state.fromDate || e.date >= state.fromDate;
        const matchTo = !state.toDate || e.date <= state.toDate;
        return matchQ && matchShop && matchFrom && matchTo;
      }).sort((a, b) => (b.date + b.createdAt).localeCompare(a.date + a.createdAt));
    }

    function getTodayEntries() {
      return state.entries.filter(e => e.date === state.selectedDate).sort((a, b) => b.createdAt.localeCompare(a.createdAt));
    }

    function getMonthEntries() {
      return state.entries.filter(e => e.date.startsWith(state.selectedMonth)).sort((a, b) => (a.date + a.createdAt).localeCompare(b.date + b.createdAt));
    }

    function totalOf(entries) {
      return entries.reduce((sum, e) => sum + Number(e.price || 0), 0);
    }

    function summarizeBy(entries, key) {
      const map = new Map();
      entries.forEach(e => map.set(e[key], (map.get(e[key]) || 0) + Number(e.price || 0)));
      return [...map.entries()].sort((a,b) => b[1]-a[1]);
    }

    function autoBackupIfNeeded(entryDate) {
      const now = new Date().toISOString();
      const dailyId = `day:${entryDate}`;
      const weeklyId = `week:${weekKey(entryDate)}`;
      const monthlyId = `month:${entryDate.slice(0,7)}`;

      const existingIds = new Set(state.backups.map(b => b.ref));
      const dataByDay = state.entries.filter(e => e.date === entryDate);
      const dataByWeek = state.entries.filter(e => weekKey(e.date) === weekKey(entryDate));
      const dataByMonth = state.entries.filter(e => e.date.startsWith(entryDate.slice(0,7)));

      if (!existingIds.has(dailyId) && dataByDay.length) {
        state.backups.unshift({ id: uid(), ref: dailyId, type: 'day', label: entryDate, createdAt: now, data: dataByDay });
      }
      if (!existingIds.has(weeklyId) && dataByWeek.length) {
        state.backups.unshift({ id: uid(), ref: weeklyId, type: 'week', label: weekKey(entryDate), createdAt: now, data: dataByWeek });
      }
      if (!existingIds.has(monthlyId) && dataByMonth.length) {
        state.backups.unshift({ id: uid(), ref: monthlyId, type: 'month', label: entryDate.slice(0,7), createdAt: now, data: dataByMonth });
      }

      // keep backups manageable
      state.backups = state.backups.slice(0, 100);
    }

    // =============================
    // EXPORTS
    // =============================
    function entryRows(entries) {
      return entries.map((e, i) => ({
        '#': i + 1,
        Date: e.date,
        Shop: e.shop,
        Person: e.person,
        Product: e.product,
        Quantity: e.quantity,
        Unit: e.unit,
        Price: Number(e.price),
        Note: e.note || '',
        CreatedAt: e.createdAt
      }));
    }

    function downloadBlob(filename, blob) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        URL.revokeObjectURL(a.href);
        a.remove();
      }, 300);

      const out = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
      downloadBlob(filename, new Blob([out], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }));

    function exportCSV(entries, filename) {

    }

    async function exportPdf(entries, title, filename) {
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('p', 'pt', 'a4');
      const margin = 40;
      let y = 50;
      pdf.setFont('helvetica', 'bold');
      pdf.setFontSize(18);
      pdf.text(title, margin, y);
      y += 22;
      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(10);
      pdf.text(`Generated: ${new Date().toLocaleString()}`, margin, y);
      y += 20;
      pdf.text(`Total Records: ${entries.length}`, margin, y);
      y += 16;
      pdf.text(`Total Amount: ${fmtMoney(totalOf(entries))}`, margin, y);
      y += 26;

      const headers = ['Date', 'Shop', 'Person', 'Product', 'Qty', 'Unit', 'Price'];
      const rows = entries.map(e => [e.date, e.shop, e.person, e.product, String(e.quantity), e.unit, fmtMoney(e.price)]);

      const pageWidth = pdf.internal.pageSize.getWidth() - margin * 2;
      const colWidths = [60, 78, 70, 100, 36, 40, 60];
      const rowHeight = 18;

      function drawRow(values, isHeader = false) {
        let x = margin;
        pdf.setFont('helvetica', isHeader ? 'bold' : 'normal');
        values.forEach((v, idx) => {
          pdf.rect(x, y - 12, colWidths[idx], rowHeight);
          pdf.text(String(v).slice(0, 18), x + 4, y);
          x += colWidths[idx];
        });
        y += rowHeight;
        if (y > 760) {
          pdf.addPage();
          y = 50;
        }
      }

      drawRow(headers, true);
      rows.forEach(r => drawRow(r));
      pdf.save(filename);
      toast(tr('downloaded'), 'success');
    }

            </div>

            <div>
              ${SummaryPanel(summarizeBy(monthEntries, 'shop'), summarizeBy(monthEntries, 'person'), summarizeBy(monthEntries, 'product').slice(0, 8))}
            </div>
          </section>
          ${BottomNav()}
        </main>
      `;
    }

    function BackupsPage() {
      return `
        <main class="px-4 py-4 space-y-6">
          ${TopBar()}
          <section class="glass rounded-[2rem] p-5 sm:p-6 shadow-soft card-3d">
            <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4 mb-5">
              <div>
                <h2 class="text-2xl font-bold">${tr('backups')}</h2>
                <p class="text-sm text-slate-500 dark:text-slate-400">${tr('deviceBackup')}</p>
              </div>
              <div class="flex flex-wrap gap-2">
                <button id="exportBackupFileBtn" class="btn-3d rounded-2xl px-4 py-2.5 glass">${tr('exportBackup')}</button>
                <label class="btn-3d rounded-2xl px-4 py-2.5 glass cursor-pointer">
                  ${tr('importBackup')}
                  <input id="importBackupInput" type="file" accept="application/json" class="hidden-file-input" />
                </label>
              </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
              ${StatCard(tr('dailyBackup'), String(state.backups.filter(b=>b.type==='day').length), 'D', tr('backupList'))}
              ${StatCard(tr('weeklyBackup'), String(state.backups.filter(b=>b.type==='week').length), 'W', tr('backupList'))}
              ${StatCard(tr('monthlyBackup'), String(state.backups.filter(b=>b.type==='month').length), 'M', tr('backupList'))}
            </div>

            <div class="overflow-x-auto table-scroll rounded-3xl border border-slate-200/60 dark:border-slate-700/60">
              <table class="min-w-full text-sm">
                <thead class="bg-slate-100/80 dark:bg-slate-800/70">
                  <tr>
                    <th class="text-left px-4 py-3">${tr('backupType')}</th>
                    <th class="text-left px-4 py-3">${tr('summary')}</th>
                    <th class="text-left px-4 py-3">${tr('records')}</th>
                    <th class="text-left px-4 py-3">${tr('createdAt')}</th>
                    <th class="text-left px-4 py-3">${tr('actions')}</th>
                  </tr>
                </thead>
                <tbody>
                  ${state.backups.length ? state.backups.map(b => `
                    <tr class="border-t border-slate-200/60 dark:border-slate-700/60">
                      <td class="px-4 py-3 capitalize">${escapeHtml(b.type)}</td>
                      <td class="px-4 py-3">${escapeHtml(b.label)}</td>
                      <td class="px-4 py-3">${b.data.length}</td>
                      <td class="px-4 py-3">${new Date(b.createdAt).toLocaleString(state.lang === 'hi' ? 'hi-IN' : 'en-IN')}</td>
                      <td class="px-4 py-3">
                        <div class="flex gap-2 flex-wrap">
                          <button data-restore-backup="${b.id}" class="restore-backup btn-3d rounded-xl px-3 py-2 text-white bg-gradient-to-r from-emerald-500 to-green-600">${tr('restore')}</button>
                          <button data-download-backup="${b.id}" class="download-backup btn-3d rounded-xl px-3 py-2 glass">${tr('download')}</button>
                        </div>
                      </td>
                    </tr>
                  `).join('') : `
                    <tr>
                      <td colspan="5" class="px-4 py-8 text-center text-slate-500 dark:text-slate-400">${tr('noData')}</td>
                    </tr>
                  `}
                </tbody>
              </table>
            </div>
          </section>
          ${BottomNav()}
        </main>
      `;
    }

    function renderEntriesTable(entries) {
      return `
        <div class="overflow-x-auto table-scroll rounded-3xl border border-slate-200/60 dark:border-slate-700/60">
          <table class="min-w-full text-sm">
            <thead class="bg-slate-100/80 dark:bg-slate-800/70">
              <tr>
                <th class="text-left px-4 py-3">${tr('date')}</th>
                <th class="text-left px-4 py-3">${tr('shop')}</th>
                <th class="text-left px-4 py-3">${tr('person')}</th>
                <th class="text-left px-4 py-3">${tr('product')}</th>
                <th class="text-left px-4 py-3">${tr('quantity')}</th>
                <th class="text-left px-4 py-3">${tr('unit')}</th>
                <th class="text-left px-4 py-3">${tr('price')}</th>
                <th class="text-left px-4 py-3">${tr('actions')}</th>
              </tr>
            </thead>
            <tbody>
              ${entries.length ? entries.map(e => `
                <tr class="border-t border-slate-200/60 dark:border-slate-700/60 hover:bg-white/40 dark:hover:bg-slate-800/40">
                  <td class="px-4 py-3 whitespace-nowrap">${formatDateNice(e.date, state.lang)}</td>
                  <td class="px-4 py-3">${escapeHtml(e.shop)}</td>
                  <td class="px-4 py-3">${escapeHtml(e.person)}</td>
                  <td class="px-4 py-3">
                    <button data-open-entry="${e.id}" class="underline decoration-dotted underline-offset-4">${escapeHtml(e.product)}</button>
                  </td>
                  <td class="px-4 py-3">${escapeHtml(e.quantity)}</td>
                  <td class="px-4 py-3">${escapeHtml(e.unit)}</td>
                  <td class="px-4 py-3 font-semibold">${fmtMoney(e.price)}</td>
                  <td class="px-4 py-3">
                    <div class="flex gap-2 flex-wrap">
                      <button data-edit="${e.id}" class="edit-btn btn-3d rounded-xl px-3 py-2 text-white bg-gradient-to-r from-blue-600 to-indigo-600">${tr('edit')}</button>
                      <button data-delete="${e.id}" class="delete-btn btn-3d rounded-xl px-3 py-2 text-white bg-gradient-to-r from-rose-500 to-red-500">${tr('del')}</button>
                    </div>
                  </td>
                </tr>
              `).join('') : `
                <tr>
                  <td colspan="8" class="px-4 py-8 text-center text-slate-500 dark:text-slate-400">${tr('noData')}</td>
                </tr>
              `}
            </tbody>
          </table>
        </div>
      `;
    }

    function EntryModal() {
      if (!state.modalEntryId) return '';
      const e = state.entries.find(x => x.id === state.modalEntryId);
      if (!e) return '';
      return `
        <div class="fixed inset-0 z-[999] bg-slate-950/50 backdrop-blur-sm p-4 flex items-center justify-center modal-enter">
          <div class="glass rounded-[2rem] p-6 w-full max-w-xl shadow-2xl">
            <div class="flex items-center justify-between gap-3 mb-5">
              <h3 class="text-2xl font-bold">${tr('entryDetails')}</h3>
              <button id="closeEntryModal" class="btn-3d rounded-2xl px-4 py-2 glass">${tr('close')}</button>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
              ${detailCell(tr('date'), formatDateNice(e.date, state.lang))}
              ${detailCell(tr('shop'), e.shop)}
              ${detailCell(tr('person'), e.person)}
              ${detailCell(tr('product'), e.product)}
              ${detailCell(tr('quantity'), String(e.quantity))}
              ${detailCell(tr('unit'), e.unit)}
              ${detailCell(tr('price'), fmtMoney(e.price))}
              ${detailCell(tr('createdAt'), new Date(e.createdAt).toLocaleString(state.lang === 'hi' ? 'hi-IN' : 'en-IN'))}
              <div class="sm:col-span-2">
                ${detailCell(tr('note'), e.note || '-')}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function detailCell(label, value) {
      return `
        <div class="rounded-2xl bg-white/50 dark:bg-slate-800/60 border border-slate-200/60 dark:border-slate-700/60 p-4">
          <div class="text-xs text-slate-500 dark:text-slate-400 mb-1">${escapeHtml(label)}</div>
          <div class="font-semibold">${escapeHtml(value)}</div>
        </div>
      `;
    }

    // =============================
    // RENDER
    // =============================
    function render() {
      applyTheme();
      persist();

      const app = $('#app');
      if (!state.auth) {
        app.innerHTML = LoginPage();
        bindLoginEvents();
        return;
      }

      let html = '';
      switch (state.page) {
        case 'add':
        case 'dashboard':
          html = DashboardPage();
          break;
        case 'ledger':
          html = LedgerPage();
          break;
        case 'reports':
          html = ReportsPage();
          break;
        case 'backups':
          html = BackupsPage();
          break;
        default:
          html = DashboardPage();
      }
      app.innerHTML = html + EntryModal();
      bindAuthedEvents();
    }

    // =============================
    // EVENTS
    // =============================
    function bindLoginEvents() {
      $('#loginForm')?.addEventListener('submit', (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const email = String(fd.get('email') || '').trim().toLowerCase();
        const password = String(fd.get('password') || '');
        const ok = APP_CONFIG.allowedUsers.find(u => u.email.toLowerCase() === email && u.password === password);
        if (!ok) return toast(tr('invalidLogin'), 'error');
        state.auth = { email: ok.email, loggedAt: new Date().toISOString() };
        render();
      });

      $('#langToggle')?.addEventListener('click', () => {
        state.lang = state.lang === 'en' ? 'hi' : 'en';
        render();
      });
      $('#themeToggle')?.addEventListener('click', () => {
        state.theme = state.theme === 'dark' ? 'light' : 'dark';
        render();
      });
    }

    function bindAuthedEvents() {
      $('#logoutBtn')?.addEventListener('click', () => {
        state.auth = null;
        render();
      });
      $('#langToggle')?.addEventListener('click', () => {
        state.lang = state.lang === 'en' ? 'hi' : 'en';
        render();
      });
      $('#themeToggle')?.addEventListener('click', () => {
        state.theme = state.theme === 'dark' ? 'light' : 'dark';
        render();
      });
      $('#langEn')?.addEventListener('click', () => { state.lang = 'en'; render(); });
      $('#langHi')?.addEventListener('click', () => { state.lang = 'hi'; render(); });
      $('#themeLight')?.addEventListener('click', () => { state.theme = 'light'; render(); });
      $('#themeDark')?.addEventListener('click', () => { state.theme = 'dark'; render(); });

      $$('.nav-btn').forEach(btn => btn.addEventListener('click', () => {
        state.page = btn.dataset.nav;
        state.editingId = null;
        render();
      }));

      $('#selectedDateInput')?.addEventListener('change', (e) => {
        state.selectedDate = e.target.value || todayStr();
        render();
      });
      $('#selectedMonthInput')?.addEventListener('change', (e) => {
        state.selectedMonth = e.target.value || monthStr();
        render();
      });

      $('#newShopName')?.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          $('#addShopBtn')?.click();
        }
      });
      $('#addShopBtn')?.addEventListener('click', () => {
        const input = $('#newShopName');
        const name = input.value.trim();
        if (!name) return;
        if (!state.shops.includes(name)) state.shops.push(name);
        input.value = '';
        toast(tr('shopAdded'), 'success');
        render();
      });

      $('#entryForm')?.addEventListener('submit', (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const unitRaw = fd.get('unit');
        const customUnit = String(fd.get('customUnit') || '').trim();
        const unit = unitRaw === 'custom' ? customUnit : unitRaw;

        const payload = {
          shop: String(fd.get('shop') || '').trim(),
          date: String(fd.get('date') || ''),
          person: String(fd.get('person') || '').trim(),
          product: String(fd.get('product') || '').trim(),
          quantity: Number(fd.get('quantity') || 0),
          unit: String(unit || '').trim(),
          price: Number(fd.get('price') || 0),
          note: String(fd.get('note') || '').trim(),
        };

        if (!payload.shop || !payload.date || !payload.person || !payload.product || !payload.quantity || !payload.unit || payload.price < 0) {
          return toast(tr('fillRequired'), 'warning');
        }

        if (state.editingId) {
          const idx = state.entries.findIndex(x => x.id === state.editingId);
          if (idx >= 0) {
            state.entries[idx] = { ...state.entries[idx], ...payload, updatedAt: new Date().toISOString() };
            toast(tr('updated'), 'success');
          }
          state.editingId = null;
        } else {
          state.entries.unshift({ id: uid(), ...payload, createdAt: new Date().toISOString() });
          toast(tr('saved'), 'success');
        }
        autoBackupIfNeeded(payload.date);
        render();
      });

      $('#cancelEditBtn')?.addEventListener('click', () => {
        state.editingId = null;
        render();
      });

      $('#unitSelect')?.addEventListener('change', (e) => {
        const wrap = $('#customUnitWrap');
        if (!wrap) return;
        wrap.classList.toggle('hidden', e.target.value !== 'custom');
      });

      $$('.edit-btn').forEach(btn => btn.addEventListener('click', () => {
        state.editingId = btn.dataset.edit;
        state.page = 'dashboard';
        render();
      }));

      $$('.delete-btn').forEach(btn => btn.addEventListener('click', () => {
        if (!confirm(tr('confirmDelete'))) return;
        state.entries = state.entries.filter(x => x.id !== btn.dataset.delete);
        toast(tr('deleted'), 'success');
        render();
      }));

      $$('[data-open-entry]').forEach(btn => btn.addEventListener('click', () => {
        state.modalEntryId = btn.dataset.openEntry;
        render();
      }));
      $('#closeEntryModal')?.addEventListener('click', () => {
        state.modalEntryId = null;
        render();
      });

      $('#searchInput')?.addEventListener('input', (e) => { state.search = e.target.value; render(); });
      $('#filterShopSelect')?.addEventListener('change', (e) => { state.filterShop = e.target.value; render(); });
      $('#fromDateInput')?.addEventListener('change', (e) => { state.fromDate = e.target.value; render(); });
      $('#toDateInput')?.addEventListener('change', (e) => { state.toDate = e.target.value; render(); });
      $('#clearFiltersBtn')?.addEventListener('click', () => {
        state.search = '';
        state.filterShop = 'all';
        state.fromDate = '';
        state.toDate = '';
        render();
      });

      $('#exportDayExcel')?.addEventListener('click', () => exportExcel(getTodayEntries(), `day-report-${state.selectedDate}.xlsx`));
      $('#exportMonthExcel')?.addEventListener('click', () => exportExcel(getMonthEntries(), `month-report-${state.selectedMonth}.xlsx`));
      $('#exportCsvBtn')?.addEventListener('click', () => exportCSV(getEntriesFiltered(), `ledger-${todayStr()}.csv`));
      $('#exportDayPdf')?.addEventListener('click', () => exportPdf(getTodayEntries(), `${APP_CONFIG.appName} - Day Report (${state.selectedDate})`, `day-report-${state.selectedDate}.pdf`));
      $('#exportMonthPdf')?.addEventListener('click', () => exportPdf(getMonthEntries(), `${APP_CONFIG.appName} - Month Report (${state.selectedMonth})`, `month-report-${state.selectedMonth}.pdf`));

      $('#backupNowBtn')?.addEventListener('click', () => {
        const snapshot = {
          id: uid(),
          ref: `manual:${new Date().toISOString()}`,
          type: 'manual',
          label: todayStr(),
          createdAt: new Date().toISOString(),
          data: [...state.entries]
        };
        state.backups.unshift(snapshot);
        state.backups = state.backups.slice(0, 100);
        toast(tr('backupCreated'), 'success');
        render();
      });

      $('#exportBackupFileBtn')?.addEventListener('click', exportBackupFile);
      $('#importBackupInput')?.addEventListener('change', async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          if (Array.isArray(data.entries)) state.entries = data.entries;
          if (Array.isArray(data.backups)) state.backups = data.backups;
          if (Array.isArray(data.shops)) state.shops = data.shops;
          toast(tr('backupImported'), 'success');
          render();
        } catch {
          toast('Invalid backup file.', 'error');
        }
      });

      $$('.restore-backup').forEach(btn => btn.addEventListener('click', () => {
        const backup = state.backups.find(b => b.id === btn.dataset.restoreBackup);
        if (!backup) return;
        const map = new Map(state.entries.map(e => [e.id, e]));
        backup.data.forEach(e => map.set(e.id, e));
        state.entries = [...map.values()].sort((a,b) => b.createdAt.localeCompare(a.createdAt));
        toast(tr('backupRestored'), 'success');
        render();
      }));

      $$('.download-backup').forEach(btn => btn.addEventListener('click', () => {
        const backup = state.backups.find(b => b.id === btn.dataset.downloadBackup);
        if (!backup) return;
        downloadBlob(`backup-${backup.type}-${backup.label}.json`, new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' }));
      }));
    }

    // =============================
    // STARTUP
    // =============================
    function firstRunSetup() {
      if (!readLS(KEYS.theme, null)) {
        state.theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      applyTheme();
    }

    firstRunSetup();
    render();
  </script>
</body>
</html>
