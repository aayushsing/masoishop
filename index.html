<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no"
  />
  <title>Masoi Village Dukan</title>
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Masoi Dukan" />
  <meta name="format-detection" content="telephone=no" />

  <style>
    :root {
      --bg1: #eef4ff;
      --bg2: #fff7ed;
      --card: rgba(255, 255, 255, 0.72);
      --card-border: rgba(255, 255, 255, 0.65);
      --text: #0f172a;
      --muted: #475569;
      --accent: #2563eb;
      --accent2: #7c3aed;
      --success: #15803d;
      --danger: #dc2626;
      --warning: #d97706;
      --white: #ffffff;
      --line: rgba(148, 163, 184, 0.26);
      --soft: rgba(255, 255, 255, 0.5);
      --soft2: rgba(255, 255, 255, 0.8);
      --shadow1: 0 20px 55px rgba(15, 23, 42, 0.12);
      --shadow2: 0 30px 80px rgba(59, 130, 246, 0.16);
      --navGlow: 0 8px 24px rgba(59, 130, 246, 0.22);
      --radius-xl: 22px;
      --radius-2xl: 28px;
      --radius-3xl: 34px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --app-height: 100vh;
      --nav-height: 92px;
      --nav-height-mobile: 86px;
      --ring: 0 0 0 4px rgba(37, 99, 235, 0.14);
    }

    .dark {
      --bg1: #020617;
      --bg2: #0f172a;
      --card: rgba(15, 23, 42, 0.72);
      --card-border: rgba(148, 163, 184, 0.12);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #60a5fa;
      --accent2: #a78bfa;
      --success: #4ade80;
      --danger: #f87171;
      --warning: #fbbf24;
      --line: rgba(148, 163, 184, 0.18);
      --soft: rgba(15, 23, 42, 0.56);
      --soft2: rgba(15, 23, 42, 0.78);
      --shadow1: 0 20px 55px rgba(2, 6, 23, 0.36);
      --shadow2: 0 30px 80px rgba(96, 165, 250, 0.16);
      --navGlow: 0 8px 28px rgba(96, 165, 250, 0.18);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
      height: 100%;
      width: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.18), transparent 24%),
        radial-gradient(circle at top right, rgba(167, 139, 250, 0.14), transparent 20%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      min-height: 100dvh;
      width: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      transition: background 0.35s ease, color 0.25s ease, filter 0.25s ease;
      overscroll-behavior-x: none;
      overscroll-behavior-y: auto;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      touch-action: auto;
      -webkit-overflow-scrolling: touch;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    input,
    select,
    textarea {
      font-size: 16px;
    }

    button {
      cursor: pointer;
      border: 0;
      background: none;
      color: inherit;
      user-select: none;
      -webkit-user-select: none;
    }

    img, svg, canvas {
      max-width: 100%;
      height: auto;
    }

    .hidden {
      display: none !important;
    }

    .app-shell {
      min-height: 100vh;
      min-height: 100dvh;
      width: 100%;
      opacity: 1 !important;
      visibility: visible !important;
      pointer-events: auto !important;
      padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 14px);
      isolation: isolate;
    }

    .page {
      padding: 16px;
      padding-left: max(16px, var(--safe-left));
      padding-right: max(16px, var(--safe-right));
      padding-bottom: calc(var(--nav-height) + 24px + var(--safe-bottom));
      animation: fadeIn 0.32s ease;
      scroll-padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 20px);
    }

    .container {
      max-width: 1480px;
      margin: 0 auto;
      width: 100%;
    }

    .glass {
      background: var(--card);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow1);
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease, background 0.22s ease;
    }

    .card-3d {
      transform-style: preserve-3d;
      transform: perspective(1200px) rotateX(0deg) rotateY(0deg) translateY(0);
      will-change: transform;
    }

    .card-3d:hover {
      transform: perspective(1200px) rotateX(2deg) rotateY(-2deg) translateY(-3px);
      box-shadow: var(--shadow2);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 16px 16px 0;
      padding-top: max(16px, var(--safe-top));
      padding-left: max(16px, var(--safe-left));
      padding-right: max(16px, var(--safe-right));
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .topbar-inner {
      border-radius: 32px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      width: 100%;
      box-shadow: 0 18px 42px rgba(15, 23, 42, 0.10);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .brand-logo {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      border-radius: 22px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 18px;
      box-shadow: 0 22px 48px rgba(59, 130, 246, 0.24);
      transform: translateZ(24px);
      position: relative;
      overflow: hidden;
    }

    .brand-logo::before {
      content: "";
      position: absolute;
      inset: 3px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.22);
    }

    .brand-meta {
      min-width: 0;
      flex: 1 1 auto;
    }

    .brand-title {
      font-size: 16px;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
      min-width: 0;
    }

    .btn {
      min-height: 40px;
      border-radius: 18px;
      padding: 10px 16px;
      background: var(--soft);
      border: 1px solid var(--line);
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease, background 0.22s ease;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08), inset 0 1px 0 rgba(255,255,255,0.2);
      position: relative;
      max-width: 100%;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: saturate(1.04);
    }

    .btn:active {
      transform: translateY(1px) scale(0.99);
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border: 0;
      box-shadow: 0 16px 30px rgba(37, 99, 235, 0.24);
    }

    .btn-success {
      color: #fff;
      background: linear-gradient(135deg, #10b981, #65a30d);
      border: 0;
      box-shadow: 0 16px 30px rgba(16, 185, 129, 0.24);
    }

    .btn-danger {
      color: #fff;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border: 0;
      box-shadow: 0 16px 30px rgba(239, 68, 68, 0.24);
    }

    .btn-warn {
      color: #fff;
      background: linear-gradient(135deg, #f59e0b, #ea580c);
      border: 0;
      box-shadow: 0 16px 30px rgba(245, 158, 11, 0.24);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--soft);
      border: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
      max-width: 100%;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 7px rgba(34, 197, 94, 0.12);
      flex: 0 0 auto;
    }

    .section {
      border-radius: var(--radius-3xl);
      padding: 20px;
      width: 100%;
      overflow: hidden;
    }

    .section-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin: 0;
      overflow-wrap: anywhere;
    }

    .section-sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .stats-wrap {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 16px;
      width: 100%;
    }

    .report-stats {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .stat-card {
      border-radius: 30px;
      padding: 18px;
      position: relative;
      overflow: hidden;
      min-width: 0;
    }

    .stat-card::after {
      content: "";
      position: absolute;
      right: -36px;
      top: -36px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.28), transparent 65%);
      pointer-events: none;
    }

    .stat-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .stat-label {
      font-size: 13px;
      color: var(--muted);
    }

    .stat-value {
      margin-top: 10px;
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      overflow-wrap: anywhere;
    }

    .stat-sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .stat-icon {
      width: 52px;
      height: 52px;
      flex: 0 0 52px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      box-shadow: 0 20px 48px rgba(37, 99, 235, 0.22);
      font-weight: 900;
      transform: translateZ(22px);
    }

    .content-cols {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(320px, 1fr);
      gap: 18px;
      align-items: start;
      width: 100%;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      width: 100%;
    }

    .form-field {
      min-width: 0;
      width: 100%;
    }

    .field-label {
      display: block;
      font-size: 13px;
      margin-bottom: 8px;
      color: var(--muted);
      font-weight: 700;
    }

    .soft-input {
      width: 100%;
      min-height: 46px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--soft2);
      color: var(--text);
      padding: 12px 14px;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease, background 0.22s ease;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      max-width: 100%;
    }

    .soft-input::placeholder {
      color: color-mix(in srgb, var(--muted) 72%, transparent);
    }

    .soft-input:focus {
      border-color: rgba(59, 130, 246, 0.58);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
      transform: translateY(-1px);
    }

    textarea.soft-input {
      min-height: 110px;
      resize: vertical;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      width: 100%;
    }

    .toolbar-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      min-width: 0;
    }

    .table-wrap {
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      border-radius: 26px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      width: 100%;
      max-width: 100%;
    }

    .table-wrap::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    .table-wrap::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.45);
      border-radius: 999px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 820px;
    }

    thead tr {
      background: rgba(148, 163, 184, 0.12);
    }

    th, td {
      text-align: left;
      padding: 14px 16px;
      font-size: 13px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    tbody tr {
      transition: background 0.16s ease, transform 0.16s ease;
    }

    tbody tr:hover {
      background: rgba(255,255,255,0.08);
    }

    .table-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tiny-btn {
      padding: 8px 12px;
      border-radius: 14px;
      min-height: 34px;
      font-size: 12px;
    }

    .summary-stack {
      display: grid;
      gap: 16px;
      width: 100%;
    }

    .summary-box {
      border-radius: 28px;
      padding: 18px;
      overflow: hidden;
    }

    .summary-head {
      font-size: 22px;
      font-weight: 900;
      margin: 0 0 14px;
      letter-spacing: -0.03em;
      overflow-wrap: anywhere;
    }

    .bar-row + .bar-row {
      margin-top: 12px;
    }

    .bar-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      font-size: 13px;
      margin-bottom: 7px;
      min-width: 0;
    }

    .bar-top span,
    .bar-top strong {
      overflow-wrap: anywhere;
    }

    .bar-track {
      height: 11px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(148, 163, 184, 0.16);
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.18);
    }

    .tiny-note {
      font-size: 12px;
      color: var(--muted);
    }

    .settings-grid {
      display: grid;
      gap: 16px;
    }

    .segment {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .segment .btn.active {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
      border: 0;
    }

    .bottom-nav-wrap {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 70;
      padding: 0 16px calc(12px + var(--safe-bottom));
      padding-left: max(16px, var(--safe-left));
      padding-right: max(16px, var(--safe-right));
      pointer-events: none;
      transform: translateZ(0);
      will-change: transform;
    }

    .bottom-nav {
      border-radius: 30px;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: nowrap;
      overflow: hidden;
      -webkit-overflow-scrolling: touch;
      box-shadow: var(--navGlow), 0 20px 44px rgba(15, 23, 42, 0.12);
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      pointer-events: auto;
      transform: translateZ(0);
      touch-action: pan-x;
      user-select: none;
      -webkit-user-select: none;
    }

    .bottom-nav::-webkit-scrollbar {
      display: none;
    }

    .bottom-nav.glass-theme {
      background: linear-gradient(180deg, rgba(255,255,255,0.20), rgba(255,255,255,0.06));
      border: 1px solid var(--line);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .bottom-nav.whatsapp-theme {
      background: linear-gradient(180deg, rgba(18,140,126,0.98), rgba(7,94,84,0.98));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 16px 40px rgba(7,94,84,0.32);
    }

    .bottom-nav.dark-theme {
      background: linear-gradient(180deg, rgba(15,23,42,0.98), rgba(2,6,23,0.98));
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 16px 40px rgba(2,6,23,0.34);
    }

    .bottom-nav.whatsapp-theme .nav-item,
    .bottom-nav.dark-theme .nav-item {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.08);
      color: #fff;
    }

    .bottom-nav.whatsapp-theme .nav-icon,
    .bottom-nav.dark-theme .nav-icon {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }

    .bottom-nav.whatsapp-theme .nav-item.active {
      background: rgba(255,255,255,0.16);
      color: #fff;
      box-shadow: 0 12px 24px rgba(255,255,255,0.14);
    }

    .bottom-nav.dark-theme .nav-item.active {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
      box-shadow: 0 16px 28px rgba(37, 99, 235, 0.26);
    }

    .backup-card-list {
      display: grid;
      gap: 14px;
    }

    .backup-card {
      border-radius: 24px;
      padding: 16px;
      background: var(--soft);
      border: 1px solid var(--line);
      display: grid;
      gap: 12px;
    }

    .backup-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .backup-card-title {
      font-size: 16px;
      font-weight: 800;
    }

    .backup-card-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .danger-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.18);
      color: var(--danger);
      font-size: 12px;
      font-weight: 800;
    }

    .more-sheet-backdrop {
      position: fixed;
      inset: 0;
      z-index: 85;
      background: rgba(2, 6, 23, 0.42);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      animation: fadeIn 0.18s ease;
    }

    .more-sheet {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(108px + var(--safe-bottom));
      z-index: 90;
      border-radius: 28px;
      padding: 14px;
      animation: fadeIn 0.2s ease;
    }

    .more-sheet-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .more-sheet-item {
      min-height: 64px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--soft);
      border: 1px solid var(--line);
      font-weight: 800;
      text-align: left;
    }

    .more-sheet-icon {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
      flex: 0 0 auto;
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.22);
    }

    .nav-item {
      min-width: 0;
      width: calc((100% - 40px) / 6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 8px 11px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.02));
      border: 1px solid var(--line);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.22s ease, opacity 0.18s ease;
      position: relative;
      overflow: hidden;
      flex: 1 1 0;
      touch-action: manipulation;
    }

    .nav-item::before {
      content: "";
      position: absolute;
      inset: -50%;
      background: radial-gradient(circle, rgba(255,255,255,0.16), transparent 55%);
      opacity: 0;
      transition: opacity 0.22s ease;
    }

    .nav-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 32px rgba(37, 99, 235, 0.16);
    }

    .nav-item:hover::before {
      opacity: 1;
    }

    .nav-item.active {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
      border: 0;
      box-shadow: 0 22px 42px rgba(37, 99, 235, 0.24);
    }

    .nav-icon {
      width: 36px;
      height: 36px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 17px;
      background: rgba(255,255,255,0.12);
      flex: 0 0 auto;

    const $ = (sel, root = document) => root.querySelector(sel);

      const d = new Date();

      return local.toISOString().slice(0, 10);
    };
    const monthStr = (d = new Date()) => {
      const local = new Date(d.getTime() - d.getTimezoneOffset() * 60000);
      return local.toISOString().slice(0, 7);
    };
    const dateInputValue = (d = new Date()) => {

    };
    const fmtMoney = (n) => `${APP_CONFIG.currency}${Number(n || 0).toFixed(2)}`;
    const fmtLitre = (n) => `${Number(n || 0).toFixed(2)} L`;
    const escapeHtml = (s) => String(s ?? "").replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
    const saveLS = (k, v) => localStorage.setItem(k, JSON.stringify(v));
    const readLS = (k, fallback) => {
      try {
        const val = localStorage.getItem(k);
        return val ? JSON.parse(val) : fallback;
      } catch {
        return fallback;
      }
    };
    const formatDateNice = (str, lang) => {
      if (!str) return "-";
      const d = new Date(str + "T00:00:00");
      return d.toLocaleDateString(lang === "hi" ? "hi-IN" : "en-IN", {
        day: "2-digit",
        month: "short",
        year: "numeric"
      });
    };
    const weekKey = (dateStr) => {
      const d = new Date(dateStr + "T00:00:00");
      const firstDay = new Date(d.getFullYear(), 0, 1);
      const pastDays = Math.floor((d - firstDay) / 86400000);
      const week = Math.ceil((pastDays + firstDay.getDay() + 1) / 7);
      return `${d.getFullYear()}-W${String(week).padStart(2, "0")}`;
    };

      document.documentElement.style.setProperty("--app-height", `${window.innerHeight}px`);

      saveLS(KEYS.lang, state.lang);

      saveLS(KEYS.auth, state.auth);
      saveLS(KEYS.data, state.entries);

    function applyTheme() {
      const useDarkApp = state.themeMode === "whole" && state.theme === "dark";
      document.documentElement.classList.toggle("dark", useDarkApp);
      document.body.classList.toggle("is-standalone", isStandaloneMode());
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute("content", state.theme === "dark" ? "#020617" : "#0f172a");
    }

    function toast(message, type = "info") {
      let wrap = $("#toastWrap");
      if (!wrap) {
        wrap = document.createElement("div");
        wrap.id = "toastWrap";
        wrap.className = "toast-wrap";
        document.body.appendChild(wrap);
      }
      const el = document.createElement("div");
      el.className = `toast ${type}`;
      el.textContent = message;
      wrap.appendChild(el);
      setTimeout(() => {
        el.style.opacity = "0";
        el.style.transform = "translateY(-6px)";
        el.style.transition = "0.24s ease";
        setTimeout(() => el.remove(), 240);
      }, 2400);
    }

    
    function confirmDeleteFiveTimes(message) {
      const prompts = [
        message,
        "Please confirm again.",
        "One more time to confirm delete.",
        "Delete cannot be undone. Confirm again.",
        "Final confirmation. Delete now?"
      ];
      for (const promptText of prompts) {
        if (!confirm(promptText)) return false;
      }
      return true;
    }

function showFlashReminder() {
      const strip = $("#flashStrip");
      const inner = $("#flashInner");
      if (!strip || !inner || !state.auth) return;
      const nextText = state.reminderAlt === "en" ? tr("reminderEn") : tr("reminderHi");
      inner.textContent = nextText;
      strip.classList.add("show");
      state.reminderAlt = state.reminderAlt === "en" ? "hi" : "en";
      persist();
      setTimeout(() => strip.classList.remove("show"), 3000);
    }

    function startReminderCycle() {
      if (state.flashTimer) clearInterval(state.flashTimer);
      if (!state.auth) return;
      setTimeout(showFlashReminder, 2500);
      state.flashTimer = setInterval(showFlashReminder, 10 * 60 * 1000);
    }

    function setInstallableMeta() {
      try {
        const iconSvg = `
          <svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 192 192">
            <defs>
              <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0%" stop-color="#2563eb"/>
                <stop offset="100%" stop-color="#7c3aed"/>
              </linearGradient>
            </defs>
            <rect width="192" height="192" rx="42" fill="url(#g)"/>
            <text x="50%" y="56%" text-anchor="middle" font-size="92" font-family="Arial, sans-serif" font-weight="900" fill="white">M</text>
          </svg>
        `.trim();

        const iconDataUrl = "data:image/svg+xml;base64," + btoa(iconSvg);

        let appleIcon = document.querySelector('link[rel="apple-touch-icon"]');
        if (!appleIcon) {
          appleIcon = document.createElement("link");
          appleIcon.rel = "apple-touch-icon";
          document.head.appendChild(appleIcon);
        }
        appleIcon.href = iconDataUrl;

        const manifest = {
          name: APP_CONFIG.appName,
          short_name: APP_CONFIG.shortName,
          start_url: "./",
          scope: "./",
          display: "standalone",
          background_color: "#0f172a",
          theme_color: "#0f172a",
          orientation: "portrait-primary",
          icons: [
            {
              src: iconDataUrl,
              sizes: "192x192",
              type: "image/svg+xml",
              purpose: "any maskable"
            },
            {
              src: iconDataUrl,
              sizes: "512x512",
              type: "image/svg+xml",
              purpose: "any maskable"
            }
          ]
        };
        const blob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        let link = document.querySelector('link[rel="manifest"]');
        if (!link) {
          link = document.createElement("link");
          link.rel = "manifest";
          document.head.appendChild(link);
        }
        link.href = url;
      } catch {}
    }

      const left = String(state.auth.email).split("@")[0] || "";
      return left.charAt(0).toUpperCase() + left.slice(1);

    function getEntriesFiltered() {
      return state.entries.filter(e => {
        const q = state.search.trim().toLowerCase();
        const matchQ =
          !q ||
          [e.shop, e.person, e.product, e.note, e.unit].some(v =>
            String(v || "").toLowerCase().includes(q)
          );
        const matchShop = state.filterShop === "all" || e.shop === state.filterShop;
        const matchFrom = !state.fromDate || e.date >= state.fromDate;
        const matchTo = !state.toDate || e.date <= state.toDate;
        return matchQ && matchShop && matchFrom && matchTo;
      }).sort((a, b) => (b.date + (b.createdAt || "")).localeCompare(a.date + (a.createdAt || "")));
    }

    function getMilkEntriesFiltered() {
      return state.milkEntries.filter(e => {

        const matchQ =
          !q ||
          [e.shop, e.person, e.type, e.note].some(v =>
            String(v || "").toLowerCase().includes(q)
          );
        const matchShop = state.filterShop === "all" || e.shop === state.filterShop;
        const matchFrom = !state.fromDate || e.date >= state.fromDate;
        const matchTo = !state.toDate || e.date <= state.toDate;
        return matchQ && matchShop && matchFrom && matchTo;
      }).sort((a, b) => (b.date + (b.createdAt || "")).localeCompare(a.date + (a.createdAt || "")));

      return state.entries
        .filter(e => e.date.startsWith(state.selectedMonth))
        .sort((a, b) => (a.date + (a.createdAt || "")).localeCompare(b.date + (b.createdAt || "")));
    }

    function getMonthMilkEntries() {
      return state.milkEntries
        .filter(e => e.date.startsWith(state.selectedMonth))
        .sort((a, b) => (a.date + (a.createdAt || "")).localeCompare(b.date + (b.createdAt || "")));
    }

    function totalOf(entries) {
      return entries.reduce((sum, e) => sum + Number(e.price || 0), 0);
    }

    function milkTotals(entries) {
      return entries.reduce((acc, e) => {
        const litres = Number(e.litres || 0);
        if (e.type === "give") acc.give += litres;
        if (e.type === "take") acc.take += litres;
        acc.net = acc.give - acc.take;
        return acc;
      }, { give: 0, take: 0, net: 0 });
    }

    function summarizeBy(entries, key) {
      const map = new Map();
      entries.forEach(e => map.set(e[key], (map.get(e[key]) || 0) + Number(e.price || 0)));
      return [...map.entries()].sort((a, b) => b[1] - a[1]);
    }

    function summarizeMilkBy(entries, key) {
      const map = new Map();
      entries.forEach(e => map.set(e[key], (map.get(e[key]) || 0) + Number(e.litres || 0)));
      return [...map.entries()].sort((a, b) => b[1] - a[1]);
    }

    function autoBackupIfNeeded(entryDate) {
      const now = new Date().toISOString();
      const dailyId = `day:${entryDate}`;
      const weeklyId = `week:${weekKey(entryDate)}`;
      const monthlyId = `month:${entryDate.slice(0, 7)}`;

      const existingIds = new Set(state.backups.map(b => b.ref));

      const shopDataByDay = state.entries.filter(e => e.date === entryDate);
      const shopDataByWeek = state.entries.filter(e => weekKey(e.date) === weekKey(entryDate));
      const shopDataByMonth = state.entries.filter(e => e.date.startsWith(entryDate.slice(0, 7)));

      const milkDataByDay = state.milkEntries.filter(e => e.date === entryDate);
      const milkDataByWeek = state.milkEntries.filter(e => weekKey(e.date) === weekKey(entryDate));
      const milkDataByMonth = state.milkEntries.filter(e => e.date.startsWith(entryDate.slice(0, 7)));

      if (!existingIds.has(dailyId) && (shopDataByDay.length || milkDataByDay.length)) {
        state.backups.unshift({
          id: uid(),
          ref: dailyId,
          type: "day",
          label: entryDate,
          createdAt: now,
          data: shopDataByDay,
          milkData: milkDataByDay
        });
      }

      if (!existingIds.has(weeklyId) && (shopDataByWeek.length || milkDataByWeek.length)) {
        state.backups.unshift({
          id: uid(),
          ref: weeklyId,
          type: "week",
          label: weekKey(entryDate),
          createdAt: now,
          data: shopDataByWeek,
          milkData: milkDataByWeek
        });
      }

      if (!existingIds.has(monthlyId) && (shopDataByMonth.length || milkDataByMonth.length)) {
        state.backups.unshift({
          id: uid(),
          ref: monthlyId,
          type: "month",
          label: entryDate.slice(0, 7),
          createdAt: now,
          data: shopDataByMonth,
          milkData: milkDataByMonth
        });
      }

      state.backups = state.backups.slice(0, 100);
    }

    function downloadBlob(filename, blob) {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        URL.revokeObjectURL(a.href);
        a.remove();
      }, 400);
      toast(tr("downloaded"), "success");
    }

    function toCSV(rows) {
      if (!rows.length) return "";
      const headers = Object.keys(rows[0]);
      const escape = (v) => {
        const s = String(v ?? "");
        if (/[,"\n]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
        return s;
      };
      return [
        headers.map(escape).join(","),
        ...rows.map(r => headers.map(h => escape(r[h])).join(","))
      ].join("\n");
    }

    function entryRows(entries) {
      return entries.map((e, i) => ({
        "#": i + 1,
        Date: e.date,
        Shop: e.shop,
        Person: e.person,
        Product: e.product,
        Quantity: e.quantity,
        Unit: e.unit,
        Price: Number(e.price),
        Note: e.note || "",
        CreatedAt: e.createdAt || ""
      }));
    }

    function milkRows(entries) {
      return entries.map((e, i) => ({
        "#": i + 1,
        Date: e.date,
        Shop: e.shop,
        Person: e.person,
        Author: e.author || "",
        Type: e.type === "give" ? "Giving" : "Taking",
        Litres: Number(e.litres),
        Note: e.note || "",
        CreatedAt: e.createdAt || ""
      }));
    }

    function exportCSV(entries, filename, mode = "ledger") {
      const rows = mode === "milk" ? milkRows(entries) : entryRows(entries);
      const csv = toCSV(rows);
      downloadBlob(filename, new Blob([csv], { type: "text/csv;charset=utf-8;" }));
    }

    function exportExcel(entries, filename, mode = "milk") {
      const rows = mode === "milk" ? milkRows(entries) : entryRows(entries);
      if (!rows.length) {
        toast(tr("noData"), "warning");
        return;
      }
      const headers = Object.keys(rows[0]);
      const html = `
        <html>
          <head><meta charset="utf-8"></head>
          <body>
            <table border="1">
              <tr>${headers.map(h => `<th>${escapeHtml(h)}</th>`).join("")}</tr>
              ${rows.map(r => `<tr>${headers.map(h => `<td>${escapeHtml(r[h])}</td>`).join("")}</tr>`).join("")}
            <!-- removed table -->
          </body>
        </html>
      `;
      downloadBlob(
        filename,
        new Blob([html], { type: "application/vnd.ms-excel;charset=utf-8;" })
      );
    }

    function printReport(entries, title, mode = "ledger") {
      const rows = mode === "milk" ? milkRows(entries) : entryRows(entries);
      const totalsText =
        mode === "milk"
          ? (() => {
              const mt = milkTotals(entries);
              return `
                <div style="margin:12px 0 20px;font-size:14px;">
                  <strong>${tr("totalGiven")}:</strong> ${fmtLitre(mt.give)} &nbsp; | &nbsp;
                  <strong>${tr("totalTaken")}:</strong> ${fmtLitre(mt.take)} &nbsp; | &nbsp;
                  <strong>${tr("netMilk")}:</strong> ${fmtLitre(mt.net)}
                </div>
              `;
            })()
          : `
            <div style="margin:12px 0 20px;font-size:14px;">
              <strong>${tr("totalPrice")}:</strong> ${fmtMoney(totalOf(entries))}
            </div>
          `;

      const headers = rows.length ? Object.keys(rows[0]) : [];
      const tableHtml = rows.length
        ? `
          <table style="width:100%; border-collapse: collapse; font-size: 12px;">
            <thead>
              <tr>${headers.map(h => `<th style="border:1px solid #ddd;padding:8px;text-align:left;background:#f4f4f5;">${escapeHtml(h)}</th>`).join("")}</tr>
            </thead>
            <tbody>
              ${rows.map(r => `<tr>${headers.map(h => `<td style="border:1px solid #ddd;padding:8px;vertical-align:top;">${escapeHtml(r[h])}</td>`).join("")}</tr>`).join("")}
            </tbody>
          <!-- removed table -->
        `
        : `<div style="padding:24px 0;color:#666;">${escapeHtml(tr("noData"))}</div>`;

      const win = window.open("", "_blank", "width=1200,height=900");
      if (!win) {
        toast(tr("exportDone"), "success");
        return;
      }
      win.document.write(`
        <!DOCTYPE html>
        <html>
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>${escapeHtml(title)}</title>
          </head>
          <body style="font-family:Arial,sans-serif;padding:26px;color:#111;">
            <h1 style="margin:0 0 8px;">${escapeHtml(title)}</h1>
            <div style="font-size:12px;color:#555;">Generated: ${new Date().toLocaleString()}</div>
            ${totalsText}
            ${tableHtml}
            <script>
              setTimeout(function(){ window.print(); }, 300);
            <\/script>
          </body>
        </html>
      `);
      win.document.close();
    }

    function render() {
      applyTheme();
      persist();
      const app = $("#app");
      if (!app) return;

      if (!state.auth) {
        app.innerHTML = loginPage();
        bindLoginEvents();
        cacheStaticForOffline();
        return;
      }

      let html = "";
      switch (state.page) {
        case "add":
          html = `${topBar()}<main class="page"><div class="container">${addEntryForm()}</div></main>${bottomNav()}`;
          break;
        case "dashboard":
          html = dashboardPage();
          break;
        case "ledger":
          html = ledgerPage();
          break;
        case "milk":
          html = milkPage();
          break;
        case "summary":
          html = summaryPage();
          break;
        case "settings":
          html = settingsPage();
          break;
        case "reports":
          html = reportsPage();
          break;
        case "backups":
          html = backupsPage();
          break;
        default:
          html = dashboardPage();
      }

      app.innerHTML = html + entryModal() + milkModal();
      bindAuthedEvents();
      lockNavTouch();
      startReminderCycle();
      cacheStaticForOffline();
    }

    function bindCommonTopActions() {
      $("#langSelect")?.addEventListener("change", (e) => {
        state.lang = e.target.value === "hi" ? "hi" : "en";
        render();
      });

      $("#themeToggleIcon")?.addEventListener("click", () => {
        state.theme = state.theme === "dark" ? "light" : "dark";
        render();
      });

      $("#installBtn")?.addEventListener("click", async () => {
        if (state.installPromptEvent) {
          state.installPromptEvent.prompt();
          try {
            await state.installPromptEvent.userChoice;
          } catch {}
          state.installPromptEvent = null;
          toast(tr("appInstalled"), "success");
          return;
        }

        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
        toast(isIOS ? tr("installHintIOS") : tr("installHintAndroid"), "info");
      });
    }

    function bindLoginEvents() {
      bindCommonTopActions();

      $("#loginForm")?.addEventListener("submit", (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const email = String(fd.get("email") || "").trim().toLowerCase();
        const password = String(fd.get("password") || "");
        const ok = APP_CONFIG.allowedUsers.find(
          u => u.email.toLowerCase() === email && u.password === password
        );
        if (!ok) {
          toast(tr("invalidLogin"), "error");
          return;
        }
        state.auth = { email: ok.email, name: ok.name || "", loggedAt: new Date().toISOString() };
        state.page = "dashboard";
        render();
      });
    }

    function bindAuthedEvents() {
      bindCommonTopActions();

      $("#logoutBtn")?.addEventListener("click", () => {
        state.auth = null;
        state.editingId = null;
        state.editingMilkId = null;
        state.modalEntryId = null;
        state.modalMilkId = null;
        if (state.flashTimer) clearInterval(state.flashTimer);
        render();
      });

      $$(".nav-item").forEach(btn => btn.addEventListener("click", () => {
        const navKey = btn.dataset.nav;
        if (navKey === "more") {
          state.mobileMoreOpen = !state.mobileMoreOpen;
          render();
          return;
        }
        state.mobileMoreOpen = false;
        state.page = navKey;
        state.editingId = null;
        state.editingMilkId = null;
        render();
      }));

      $$("#moreSheetBackdrop, [data-more-nav]").forEach(btn => btn.addEventListener("click", () => {
        const navKey = btn.dataset.moreNav;
        if (navKey) {
          state.page = navKey;
          state.editingId = null;
          state.editingMilkId = null;
        }
        state.mobileMoreOpen = false;
        render();
      }));

      $("#langEn")?.addEventListener("click", () => { state.lang = "en"; render(); });
      $("#langHi")?.addEventListener("click", () => { state.lang = "hi"; render(); });
      $("#themeLight")?.addEventListener("click", () => { state.theme = "light"; render(); });
      $("#themeDark")?.addEventListener("click", () => { state.theme = "dark"; render(); });
      $("#themeModeWhole")?.addEventListener("click", () => { state.themeMode = "whole"; render(); });
      $("#themeModeNav")?.addEventListener("click", () => { state.themeMode = "nav"; render(); });
      $("#navThemeGlass")?.addEventListener("click", () => { state.navTheme = "glass"; render(); });
      $("#navThemeWhatsapp")?.addEventListener("click", () => { state.navTheme = "whatsapp"; render(); });
      $("#navThemeDark")?.addEventListener("click", () => { state.navTheme = "dark"; render(); });

      $("#selectedDateInput")?.addEventListener("change", (e) => {
        state.selectedDate = e.target.value || dateInputValue();
        render();
      });

      $("#selectedMonthInput")?.addEventListener("change", (e) => {
        state.selectedMonth = e.target.value || monthStr();
        render();
      });

      $("#newShopName")?.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          $("#addShopBtn")?.click();
        }
      });

      $("#addShopBtn")?.addEventListener("click", () => {
        const input = $("#newShopName");
        if (!input) return;
        const name = input.value.trim();
        if (!name) return;
        if (!state.shops.includes(name)) {
          state.shops.push(name);
          toast(tr("shopAdded"), "success");
        }
        input.value = "";
        render();
      });

      $("#entryForm")?.addEventListener("submit", (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const unitRaw = String(fd.get("unit") || "");
        const customUnit = String(fd.get("customUnit") || "").trim();
        const unit = unitRaw === "custom" ? customUnit : unitRaw;
        const payload = {
          shop: String(fd.get("shop") || "").trim(),
          date: String(fd.get("date") || ""),
          person: String(fd.get("person") || "").trim(),
          product: String(fd.get("product") || "").trim(),
          quantity: Number(fd.get("quantity") || 0),
          unit: String(unit || "").trim(),
          price: Number(fd.get("price") || 0),
          note: String(fd.get("note") || "").trim()
        };

        if (!payload.shop || !payload.date || !payload.person || !payload.product || payload.quantity <= 0 || !payload.unit || payload.price < 0) {
          toast(tr("fillRequired"), "warning");
          return;
        }

        if (state.editingId) {
          const idx = state.entries.findIndex(x => x.id === state.editingId);
          if (idx >= 0) {
            state.entries[idx] = { ...state.entries[idx], ...payload, updatedAt: new Date().toISOString() };
            toast(tr("updated"), "success");
          }
          state.editingId = null;
        } else {
          state.entries.unshift({ id: uid(), ...payload, createdAt: new Date().toISOString() });
          toast(tr("saved"), "success");
        }

        autoBackupIfNeeded(payload.date);
        render();
      });

      $("#milkForm")?.addEventListener("submit", (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const payload = {
          shop: String(fd.get("shop") || "").trim(),
          date: String(fd.get("date") || ""),
          person: String(fd.get("person") || "").trim(),
          author: String(fd.get("author") || "").trim(),
          type: String(fd.get("type") || "give"),
          litres: Number(fd.get("litres") || 0),
          note: String(fd.get("note") || "").trim()
        };

        if (!payload.shop || !payload.date || !payload.person || !payload.type || payload.litres <= 0) {
          toast(tr("fillRequired"), "warning");
          return;
        }

        if (state.editingMilkId) {
          const idx = state.milkEntries.findIndex(x => x.id === state.editingMilkId);
          if (idx >= 0) {
            state.milkEntries[idx] = { ...state.milkEntries[idx], ...payload, updatedAt: new Date().toISOString() };
            toast(tr("milkUpdated"), "success");
          }
          state.editingMilkId = null;
        } else {
          state.milkEntries.unshift({ id: uid(), ...payload, createdAt: new Date().toISOString() });
          toast(tr("milkSaved"), "success");
        }

        autoBackupIfNeeded(payload.date);
        render();
      });

      $("#cancelEditBtn")?.addEventListener("click", () => {
        state.editingId = null;
        render();
      });

      $("#cancelMilkEditBtn")?.addEventListener("click", () => {
        state.editingMilkId = null;
        render();
      });

      $("#unitSelect")?.addEventListener("change", (e) => {
        const wrap = $("#customUnitWrap");
        if (!wrap) return;
        wrap.classList.toggle("hidden", e.target.value !== "custom");
      });

      $$("[data-edit]").forEach(btn => btn.addEventListener("click", () => {
        state.editingId = btn.dataset.edit;
        state.page = "dashboard";
        render();
      }));

      $$("[data-delete]").forEach(btn => btn.addEventListener("click", () => {
        if (!confirmDeleteFiveTimes(tr("confirmDelete"))) return;
        state.entries = state.entries.filter(x => x.id !== btn.dataset.delete);
        toast(tr("deleted"), "success");
        render();
      }));

      $$("[data-edit-milk]").forEach(btn => btn.addEventListener("click", () => {
        state.editingMilkId = btn.dataset.editMilk;
        state.page = "milk";
        render();
      }));

      $$("[data-delete-milk]").forEach(btn => btn.addEventListener("click", () => {
        if (!confirmDeleteFiveTimes(tr("confirmDeleteMilk"))) return;
        state.milkEntries = state.milkEntries.filter(x => x.id !== btn.dataset.deleteMilk);
        toast(tr("milkDeleted"), "success");
        render();
      }));

      $$("[data-open-entry]").forEach(btn => btn.addEventListener("click", () => {
        state.modalEntryId = btn.dataset.openEntry;
        render();
      }));

      $$("[data-open-milk]").forEach(btn => btn.addEventListener("click", () => {
        state.modalMilkId = btn.dataset.openMilk;
        render();
      }));

      $("#closeEntryModal")?.addEventListener("click", () => {
        state.modalEntryId = null;
        render();
      });

      $("#closeMilkModal")?.addEventListener("click", () => {
        state.modalMilkId = null;
        render();
      });

      $(".modal-backdrop")?.addEventListener("click", (e) => {
        if (e.target.classList.contains("modal-backdrop")) {
          state.modalEntryId = null;
          state.modalMilkId = null;
          render();
        }
      });

      $("#searchInput")?.addEventListener("input", (e) => {
        state.search = e.target.value;
        render();
      });
      $("#filterShopSelect")?.addEventListener("change", (e) => {
        state.filterShop = e.target.value;
        render();
      });
      $("#fromDateInput")?.addEventListener("change", (e) => {
        state.fromDate = e.target.value;
        render();
      });
      $("#toDateInput")?.addEventListener("change", (e) => {
        state.toDate = e.target.value;
        render();
      });

      $("#clearFiltersBtn")?.addEventListener("click", () => {
        state.search = "";
        state.filterShop = "all";
        state.fromDate = "";
        state.toDate = "";
        render();
      });

      $("#exportDayExcel")?.addEventListener("click", () => exportExcel(getTodayEntries(), `day-report-${state.selectedDate}.xls`, "ledger"));
      $("#exportMonthExcel")?.addEventListener("click", () => exportExcel(getMonthEntries(), `month-report-${state.selectedMonth}.xls`, "ledger"));
      $("#exportCsvBtn")?.addEventListener("click", () => exportCSV(getEntriesFiltered(), `ledger-${todayStr()}.csv`, "ledger"));
      $("#exportDayPdf")?.addEventListener("click", () => printReport(getTodayEntries(), `${APP_CONFIG.appName} - Day Report (${state.selectedDate})`, "ledger"));
      $("#exportMonthPdf")?.addEventListener("click", () => printReport(getMonthEntries(), `${APP_CONFIG.appName} - Month Report (${state.selectedMonth})`, "ledger"));

      $("#exportMilkDayExcel")?.addEventListener("click", () => exportExcel(getTodayMilkEntries(), `milk-day-report-${state.selectedDate}.xls`, "milk"));
      $("#exportMilkMonthExcel")?.addEventListener("click", () => exportExcel(getMonthMilkEntries(), `milk-month-report-${state.selectedMonth}.xls`, "milk"));
      $("#exportMilkDayPdf")?.addEventListener("click", () => printReport(getTodayMilkEntries(), `${APP_CONFIG.appName} - Milk Day Report (${state.selectedDate})`, "milk"));
      $("#exportMilkMonthPdf")?.addEventListener("click", () => printReport(getMonthMilkEntries(), `${APP_CONFIG.appName} - Milk Month Report (${state.selectedMonth})`, "milk"));

      $("#backupNowBtn")?.addEventListener("click", () => {
        const snapshot = {
          id: uid(),
          ref: `manual:${new Date().toISOString()}`,
          type: "manual",
          label: todayStr(),
          createdAt: new Date().toISOString(),
          data: [...state.entries],
          milkData: [...state.milkEntries]
        };
        state.backups.unshift(snapshot);
        state.backups = state.backups.slice(0, 100);
        toast(tr("backupCreated"), "success");
        render();
      });

      $("#exportBackupFileBtn")?.addEventListener("click", exportBackupFile);

      $("#importBackupInput")?.addEventListener("change", async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          if (Array.isArray(data.entries)) state.entries = data.entries;
          if (Array.isArray(data.milkEntries)) state.milkEntries = data.milkEntries;
          if (Array.isArray(data.backups)) state.backups = data.backups;
          if (Array.isArray(data.shops)) state.shops = data.shops;
          toast(tr("backupImported"), "success");
          render();
        } catch {
          toast(tr("importError"), "error");
        }
      });

      $$("[data-restore-backup]").forEach(btn => btn.addEventListener("click", () => {
        const backup = state.backups.find(b => b.id === btn.dataset.restoreBackup);
        if (!backup) return;

        const ledgerMap = new Map(state.entries.map(e => [e.id, e]));
        (backup.data || []).forEach(e => ledgerMap.set(e.id, e));
        state.entries = [...ledgerMap.values()].sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""));

        const milkMap = new Map(state.milkEntries.map(e => [e.id, e]));
        (backup.milkData || []).forEach(e => milkMap.set(e.id, e));
        state.milkEntries = [...milkMap.values()].sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""));

        toast(tr("backupRestored"), "success");
        render();
      }));

      $$("[data-download-backup]").forEach(btn => btn.addEventListener("click", () => {
        const backup = state.backups.find(b => b.id === btn.dataset.downloadBackup);
        if (!backup) return;
        downloadBlob(
          `backup-${backup.type}-${backup.label}.json`,
          new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" })
        );
      }));
    }

    function hideSplashAndShowApp() {
      const splash = $("#splash");
      const app = $("#app");
      if (app) {
        app.style.opacity = "1";
        app.style.visibility = "visible";
        app.style.pointerEvents = "auto";
      }

      setTimeout(() => {
        if (splash) {
          splash.classList.add("hide");
          setTimeout(() => {
            if (splash.parentNode) splash.remove();
            toast(tr("appLoaded"), "success");
          }, 650);
        }
      }, 1800);
    }
    function lockNavTouch() {
      const navWrap = $(".bottom-nav-wrap");
      const nav = $(".bottom-nav");
      [navWrap, nav].forEach((el) => {
        if (!el) return;
        el.style.touchAction = "pan-x";
      });
    }

    function enhanceSmoothness() {
      document.documentElement.style.scrollBehavior = "smooth";
      document.body.style.webkitOverflowScrolling = "touch";
      document.body.style.overscrollBehaviorX = "none";
      document.body.style.overscrollBehaviorY = "auto";
    }

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      state.installPromptEvent = e;
    });

    window.addEventListener("appinstalled", () => {
      state.installPromptEvent = null;
      toast(tr("appInstalled"), "success");
    });

    window.addEventListener("online", () => {
      state.online = true;
      render();
    });

    window.addEventListener("offline", () => {
      state.online = false;
      render();
    });

    window.addEventListener("resize", () => {
      setRealViewportHeight();
      applyTheme();
    });

    window.addEventListener("orientationchange", () => {
      setTimeout(() => {
        setRealViewportHeight();
        applyTheme();
      }, 150);
    });

    document.addEventListener("DOMContentLoaded", () => {
      setRealViewportHeight();
      setInstallableMeta();
      applyTheme();
      enhanceSmoothness();
      render();
      hideSplashAndShowApp();
    });
  </script>
</body>
</html>
